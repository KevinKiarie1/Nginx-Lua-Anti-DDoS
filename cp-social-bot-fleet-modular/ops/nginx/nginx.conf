# ============================================================
# Nginx Reverse Proxy — Oracle Cloud A1 Free Tier
# ============================================================
# Lightweight reverse proxy in front of the NestJS app.
# Provides: connection limiting, basic rate limiting, request
# buffering, timeouts, and security headers.
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /tmp/nginx.pid;

events {
    worker_connections 256;
}

http {
    # Basic rate limiting — 10 requests/sec per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # Connection limiting — max 20 concurrent per IP
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    upstream app {
        server app:3000;
        keepalive 8;
    }

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Request size limit
        client_max_body_size 5m;

        # Timeouts tuned for long-running bot tasks
        proxy_connect_timeout 10s;
        proxy_read_timeout    300s;
        proxy_send_timeout    60s;

        location / {
            limit_req   zone=api burst=20 nodelay;
            limit_conn  addr 20;

            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection "";
        }

        # Health check endpoint — no rate limiting
        location /api/health {
            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        # Block common scan paths
        location ~ /\.(env|git|svn) {
            deny all;
            return 404;
        }
    }
}
