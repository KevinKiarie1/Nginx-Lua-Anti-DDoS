# ============================================================
# Nginx Reverse Proxy — Small Production (optional 4th container)
# ============================================================
# If you want edge security in front of app-api, add this to
# docker-compose.small-prod.yml as a 4th container:
#
#   nginx:
#     image: nginx:1.25-alpine
#     ports:
#       - '80:80'
#     volumes:
#       - ./ops/nginx/nginx-small-prod.conf:/etc/nginx/nginx.conf:ro
#     depends_on:
#       app-api:
#         condition: service_healthy
#     deploy:
#       resources:
#         limits:
#           memory: 64M
#           cpus: '0.25'
#     networks:
#       - botnet
#
# Then remove the `ports: ['3000:3000']` from app-api.
# ============================================================

worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid       /tmp/nginx.pid;

events {
    worker_connections 128;
}

http {
    limit_req_zone  $binary_remote_addr zone=api:2m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=addr:2m;

    upstream api {
        server app-api:3000;
        keepalive 4;
    }

    server {
        listen 80;
        server_name _;

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;

        client_max_body_size 5m;

        proxy_connect_timeout 10s;
        proxy_read_timeout    300s;
        proxy_send_timeout    60s;

        location / {
            limit_req   zone=api burst=20 nodelay;
            limit_conn  addr 20;

            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection "";
        }

        location /api/health {
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        location ~ /\.(env|git|svn) {
            deny all;
            return 404;
        }
    }
}
